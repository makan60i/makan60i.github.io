<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0a0c11"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>LiveTV Sport</title>
  <link rel="manifest" href="manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #080a0f;
      --surface: #10131c;
      --surface2:#181c28;
      --border:  #1f2436;
      --accent:  #00d4ff;
      --accent2: #ff3d5a;
      --text:    #dde3f0;
      --muted:   #4a5270;
      --live:    #ff3d5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; overflow: hidden; }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0; background: var(--bg); z-index: 999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    #loader .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 52px; font-weight: 800; letter-spacing: 4px; color: var(--accent); }
    #loader .logo span { color: var(--accent2); }
    #loader p { color: var(--muted); font-size: 18px; }
    #loader.hidden { display: none; }
    .spinner { width: 44px; height: 44px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MAIN LAYOUT ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── HEADER ── */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 40px; flex-shrink: 0;
      background: linear-gradient(135deg, #0a0c11, #0f1320);
      border-bottom: 2px solid var(--border);
    }
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: 4px; color: var(--accent); }
    .logo span { color: var(--accent2); }
    #status-bar { font-size: 16px; color: var(--muted); }
    #refresh-btn {
      background: transparent; border: 2px solid var(--border); border-radius: 10px;
      color: var(--accent); padding: 10px 24px; font-size: 16px; cursor: pointer;
      font-family: 'Barlow', sans-serif;
    }
    #refresh-btn:focus { outline: 3px solid var(--accent); border-color: var(--accent); }

    /* ── SPORT TABS ── */
    #sport-tabs-wrap { padding: 20px 40px 0; flex-shrink: 0; overflow-x: auto; }
    #sport-tabs-wrap::-webkit-scrollbar { display: none; }
    #sport-tabs { display: flex; gap: 12px; width: max-content; }
    .sport-tab {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 110px; height: 85px; border-radius: 14px;
      background: var(--surface); border: 2px solid var(--border);
      cursor: pointer; transition: all .15s; flex-shrink: 0;
    }
    .sport-tab .tab-icon { font-size: 30px; line-height: 1; }
    .sport-tab .tab-label { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px; margin-top: 6px; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; }
    .sport-tab:focus, .sport-tab.active { border-color: var(--accent); background: #0c1a27; outline: none; }
    .sport-tab.active .tab-label, .sport-tab:focus .tab-label { color: var(--accent); }

    /* ── MATCH LIST ── */
    #match-view { flex: 1; overflow-y: auto; padding: 16px 40px 20px; }
    #match-view::-webkit-scrollbar { width: 6px; }
    #match-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .section-label {
      font-size: 13px; font-weight: 700; color: var(--muted);
      letter-spacing: 2px; text-transform: uppercase; padding: 14px 0 8px;
      font-family: 'Barlow Condensed', sans-serif;
    }

    .match-card {
      display: flex; align-items: center; gap: 20px;
      padding: 18px 24px; margin-bottom: 10px;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 14px; cursor: pointer; transition: all .15s;
      position: relative; overflow: hidden;
    }
    .match-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: transparent; transition: background .15s;
    }
    .match-card:focus, .match-card:hover { border-color: var(--accent); background: #0c1a27; outline: none; }
    .match-card:focus::before, .match-card:hover::before { background: var(--accent); }

    .match-icon { font-size: 36px; width: 48px; text-align: center; flex-shrink: 0; }
    .match-info { flex: 1; min-width: 0; }
    .match-title { font-size: 22px; font-weight: 700; color: var(--text); font-family: 'Barlow Condensed', sans-serif; }
    .match-meta { font-size: 15px; color: var(--muted); margin-top: 4px; }
    .match-score { font-size: 28px; font-weight: 800; color: var(--accent); font-family: 'Barlow Condensed', sans-serif; flex-shrink: 0; min-width: 80px; text-align: center; }
    .match-badge { flex-shrink: 0; padding: 6px 14px; border-radius: 6px; font-size: 14px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; }
    .match-badge.live { background: var(--live); color: #fff; animation: pulse 2s infinite; }
    .match-badge.upcoming { background: var(--surface2); color: var(--accent); border: 1px solid var(--accent); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

    .empty-state { padding: 80px 20px; text-align: center; color: var(--muted); }
    .empty-state .emoji { font-size: 64px; margin-bottom: 20px; }
    .empty-state p { font-size: 20px; line-height: 1.6; }

    /* ── PLAYER VIEW ── */
    #player-view { display: none; flex-direction: column; height: 100vh; }
    #player-view.active { display: flex; }

    #player-header {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 40px; flex-shrink: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    #back-btn {
      background: var(--surface2); border: 2px solid var(--border);
      border-radius: 10px; color: var(--accent); padding: 10px 24px;
      font-size: 18px; cursor: pointer; font-family: 'Barlow', sans-serif; flex-shrink: 0;
    }
    #back-btn:focus { outline: 3px solid var(--accent); border-color: var(--accent); }
    #match-name { font-size: 20px; font-weight: 700; flex: 1; font-family: 'Barlow Condensed', sans-serif; }
    #fs-btn {
      background: transparent; border: 2px solid var(--border); border-radius: 10px;
      color: var(--accent); padding: 10px 20px; font-size: 16px; cursor: pointer;
      font-family: 'Barlow', sans-serif; flex-shrink: 0;
    }
    #fs-btn:focus { outline: 3px solid var(--accent); border-color: var(--accent); }

    #player-list {
      display: flex; flex-wrap: wrap; gap: 12px;
      padding: 16px 40px; flex-shrink: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .player-btn {
      background: var(--surface2); border: 2px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 14px 28px;
      font-size: 18px; font-weight: 700; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; min-width: 150px; text-align: center;
    }
    .player-btn:focus, .player-btn.active { background: var(--accent); color: #000; border-color: var(--accent); outline: none; }
    .player-btn.french { border-color: #0055a4; background: #0a1628; color: #fff; }
    .player-btn.french:focus, .player-btn.french.active { background: #0055a4; color: #fff; border-color: #0055a4; }

    #iframe-wrap { flex: 1; background: #000; position: relative; display: flex; }
    #iframe-wrap.cinema { position: fixed; inset: 0; z-index: 9999; }
    #stream-frame { width: 100%; height: 100%; border: none; display: block; }
    #loading-overlay {
      position: absolute; inset: 0; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      color: var(--muted); font-size: 18px;
    }
    #no-player {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      color: var(--muted); padding: 40px; text-align: center;
    }
    #no-player .big { font-size: 64px; }
    #no-player p { font-size: 18px; line-height: 1.6; }
    #open-site-btn {
      background: var(--accent); color: #000; border: none; border-radius: 12px;
      padding: 14px 32px; font-size: 18px; font-weight: 700; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="logo">LIVE<span>TV</span></div>
  <div class="spinner"></div>
  <p>Chargement des matchs...</p>
</div>

<div id="app">
  <div id="header">
    <div class="logo">LIVE<span>TV</span></div>
    <div id="status-bar">Chargement...</div>
    <button id="refresh-btn" tabindex="0" onclick="loadMatches()">↻ Actualiser</button>
  </div>
  <div id="sport-tabs-wrap"><div id="sport-tabs"></div></div>
  <div id="match-view"><div id="match-list"></div></div>
</div>

<div id="player-view">
  <div id="player-header">
    <button id="back-btn" tabindex="0" onclick="goBack()">← Retour</button>
    <span id="match-name"></span>
    <button id="fs-btn" tabindex="0" onclick="toggleCinema()">⛶ Plein écran</button>
  </div>
  <div id="player-list"></div>
  <div id="iframe-wrap">
    <div id="loading-overlay"><div class="spinner"></div><span>Chargement...</span></div>
    <iframe id="stream-frame" allowfullscreen webkitallowfullscreen mozallowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>
  </div>
  <div id="no-player" style="display:none">
    <div class="big">📡</div>
    <p>Aucun player détecté.<br>Ouvre la page directement.</p>
    <button id="open-site-btn" tabindex="0" onclick="openInBrowser()">Ouvrir dans le navigateur</button>
  </div>
</div>

<script>
const BASE_URL   = 'https://livetv.sx/frx/';
const CORS_PROXY = 'https://cold-shadow-369a.dalozdamienp2.workers.dev/?url=';

const SPORT_CATEGORIES = [
  { id:'all',       icon:'🏅', label:'Tous',     keywords:[] },
  { id:'foot',      icon:'⚽', label:'Foot',      keywords:['football','futsal','ligue','premier','bundesliga','serie a','primera','eredivisie','coupe','liga','championship','superliga','botola','allsvenskan','hnl'] },
  { id:'basket',    icon:'🏀', label:'Basket',    keywords:['basketball','basket','nba','eurocoupe','enbl','vtb'] },
  { id:'tennis',    icon:'🎾', label:'Tennis',    keywords:['tennis','atp','wta','challenger'] },
  { id:'hockey',    icon:'🏒', label:'Hockey',    keywords:['hockey','glace','nhl','eishockey','ligue nationale'] },
  { id:'handball',  icon:'🤾', label:'Handball',  keywords:['handball'] },
  { id:'volley',    icon:'🏐', label:'Volley',    keywords:['volley'] },
  { id:'tdtable',   icon:'🏓', label:'T.Table',   keywords:['tennis de table'] },
  { id:'baseball',  icon:'⚾', label:'Baseball',  keywords:['baseball','mlb'] },
  { id:'waterpolo', icon:'🏊', label:'W.Polo',    keywords:['water polo'] },
  { id:'snooker',   icon:'🎱', label:'Snooker',   keywords:['snooker','billard'] },
  { id:'cricket',   icon:'🏏', label:'Cricket',   keywords:['cricket'] },
  { id:'combat',    icon:'🥊', label:'Combat',    keywords:['boxe','boxing','ufc','mma','combat'] },
  { id:'courses',   icon:'🏎️', label:'Courses',   keywords:['course','moto','formula','f1','nascar','cyclisme'] },
];

function getSportCategory(meta) {
  const m = (meta||'').toLowerCase();
  for (const cat of SPORT_CATEGORIES) {
    if (cat.id==='all') continue;
    if (cat.keywords.some(k=>m.includes(k))) return cat.id;
  }
  return 'other';
}
function getIcon(catId) { return SPORT_CATEGORIES.find(c=>c.id===catId)?.icon || '📺'; }

let allMatches=[], currentMatchUrl='', activeCategory='all';

function setStatus(msg) { document.getElementById('status-bar').textContent=msg; }

async function fetchHTML(url) {
  const res = await fetch(CORS_PROXY+encodeURIComponent(url), {headers:{'User-Agent':'Mozilla/5.0'}});
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

function parseMatches(html, baseUrl) {
  const doc = new DOMParser().parseFromString(html,'text/html');
  const results=[], seen=new Set();
  doc.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href')||'';
    if (!href.includes('/eventinfo/')) return;
    let fullUrl='';
    try { fullUrl=new URL(href,baseUrl).href; } catch { return; }
    if (seen.has(fullUrl)) return;
    const row = a.closest('tr,td,div,li')||a;
    const blockText = (row.textContent||'').replace(/\s+/g,' ').trim();
    const title = (a.textContent||'').replace(/\s+/g,' ').trim();
    if (!title||title.length<3) return;
    const sportMatch = blockText.match(/^([^|]+?\.\s+[^|.]+?\.\s+[^|.]+?)\s+[\[|]/);
    const sport = sportMatch?sportMatch[1].trim():'';
    const timeMatch = blockText.match(/(\d{2}):(\d{2})\s*\(/);
    const score = blockText.match(/\d+:\d+/)?.[0]||'';
    const time = timeMatch?`${timeMatch[1]}:${timeMatch[2]}`:'';
    const isLive = score!==''&&(!time||(()=>{const now=new Date(),d=new Date();if(timeMatch)d.setHours(parseInt(timeMatch[1]),parseInt(timeMatch[2]),0,0);return now>=d;})());
    const category = getSportCategory(blockText);
    const meta = [sport,time?`🕐 ${time}`:''].filter(Boolean).join(' · ');
    seen.add(fullUrl);
    results.push({url:fullUrl,title,meta,score,category,isLive,time});
  });
  return results;
}

function parsePlayers(html, pageUrl) {
  const doc = new DOMParser().parseFromString(html,'text/html');
  const players=[], seen=new Set();

  // Mots-clés français dans le nom du stream
  const frKeywords = ['fr', 'fra', 'french', 'français', 'france', 'tf1', 'canal', 'bein', 'rmc', 'l\'equipe', 'equipe tv', 'beinsports'];

  doc.querySelectorAll('a[href*="webplayer2.php"]').forEach(a => {
    const href=a.getAttribute('href')||'';
    if (seen.has(href)) return;
    seen.add(href);
    const row=a.closest('tr')||a.parentElement;
    const rowText=(row?.textContent||'').replace(/\s+/g,' ').toLowerCase();
    const kbps=rowText.match(/(\d+)kbps/)?.[1]||'';

    // Détecter si c'est un stream français
    const isFr = href.includes('lang=fr') || frKeywords.some(k => rowText.includes(k));

    const label = (isFr ? '🇫🇷 ' : '▶ ') + (kbps ? `${kbps} kbps` : `Player ${players.length+1}`);
    players.push({url:href, label, isFr});
  });

  // Trier : français en premier
  players.sort((a, b) => (b.isFr ? 1 : 0) - (a.isFr ? 1 : 0));

  if (!players.length) {
    doc.querySelectorAll('iframe[src]').forEach(iframe => {
      const src=iframe.getAttribute('src')||'';
      if (!src||src.includes('flash')||src.includes('.swf')) return;
      let fullSrc='';
      try { fullSrc=new URL(src,pageUrl).href; } catch { return; }
      if (seen.has(fullSrc)) return;
      seen.add(fullSrc);
      players.push({url:fullSrc,label:`▶ Player ${players.length+1}`,isFr:false});
    });
  }

  return players;
}

async function loadMatches() {
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true;
  setStatus('⏳ Connexion...');
  allMatches=[];
  renderMatches([]);
  try {
    const html=await fetchHTML(BASE_URL);
    allMatches=parseMatches(html,BASE_URL);
    renderMatches(getFilteredMatches());
    setStatus(`✅ ${allMatches.length} match${allMatches.length>1?'s':''}`);
    document.getElementById('loader').classList.add('hidden');
    setTimeout(()=>{ const f=document.querySelector('.match-card'); if(f)f.focus(); },200);
  } catch(err) {
    setStatus('❌ Site inaccessible');
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('match-list').innerHTML=`<div class="empty-state"><div class="emoji">📡</div><p>Impossible de charger les matchs.<br>Vérifie ta connexion.</p></div>`;
  }
  btn.disabled=false;
}

function getFilteredMatches() {
  if (activeCategory==='all') return allMatches;
  return allMatches.filter(m=>m.category===activeCategory);
}

function renderMatches(matches) {
  const list=document.getElementById('match-list');
  if (!matches.length) { list.innerHTML=`<div class="empty-state"><div class="emoji">🔍</div><p>Aucun match trouvé.</p></div>`; return; }
  if (activeCategory==='all') {
    const groups={};
    matches.forEach(m=>{ const c=m.category||'other'; if(!groups[c])groups[c]=[]; groups[c].push(m); });
    let html='';
    for (const cat of SPORT_CATEGORIES) {
      if (cat.id==='all') continue;
      const g=groups[cat.id];
      if (!g?.length) continue;
      html+=`<div class="section-label">${cat.icon} ${cat.label} — ${g.length}</div>`;
      html+=g.map(m=>cardHTML(m)).join('');
    }
    if (groups['other']?.length) {
      html+=`<div class="section-label">📺 Autres — ${groups['other'].length}</div>`;
      html+=groups['other'].map(m=>cardHTML(m)).join('');
    }
    list.innerHTML=html;
  } else {
    const cat=SPORT_CATEGORIES.find(c=>c.id===activeCategory);
    list.innerHTML=`<div class="section-label">${cat?.icon} ${cat?.label} — ${matches.length}</div>`+matches.map(m=>cardHTML(m)).join('');
  }
}

function cardHTML(m) {
  const idx=allMatches.indexOf(m);
  const badge=m.isLive?`<div class="match-badge live">LIVE</div>`:`<div class="match-badge upcoming">${m.time||'...'}</div>`;
  const score=m.score?`<div class="match-score">${escHtml(m.score)}</div>`:'';
  return `<div class="match-card" tabindex="0" data-idx="${idx}" onclick="openMatch(${idx})">
    <div class="match-icon">${getIcon(m.category)}</div>
    <div class="match-info">
      <div class="match-title">${escHtml(m.title)}</div>
      <div class="match-meta">${escHtml(m.meta||'')}</div>
    </div>
    ${score}${badge}
  </div>`;
}

function selectCategory(catId) {
  activeCategory=catId;
  document.querySelectorAll('.sport-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.sport-tab[data-cat="${catId}"]`)?.classList.add('active');
  renderMatches(getFilteredMatches());
  setTimeout(()=>{ const f=document.querySelector('.match-card'); if(f)f.focus(); },100);
}

function escHtml(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function openMatch(idx) {
  const match=allMatches[idx];
  if (!match) return;
  currentMatchUrl=match.url;
  document.getElementById('match-name').textContent=match.title;
  document.getElementById('app').style.display='none';
  document.getElementById('player-view').classList.add('active');
  document.getElementById('player-list').innerHTML='';
  document.getElementById('no-player').style.display='none';
  document.getElementById('iframe-wrap').style.display='flex';
  document.getElementById('iframe-wrap').innerHTML='<div id="loading-overlay"><div class="spinner"></div><span>Recherche des players...</span></div><iframe id="stream-frame" allowfullscreen webkitallowfullscreen mozallowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture" style="width:100%;height:100%;border:none;display:block"></iframe>';
  try {
    const html=await fetchHTML(match.url);
    const players=parsePlayers(html,match.url);
    if (!players.length) { document.getElementById('iframe-wrap').style.display='none'; document.getElementById('no-player').style.display='flex'; return; }
    renderPlayers(players);
    loadPlayerUrl(players[0].url);
    setTimeout(()=>{ const f=document.querySelector('.player-btn'); if(f)f.focus(); },200);
  } catch(err) {
    document.getElementById('iframe-wrap').style.display='none';
    document.getElementById('no-player').style.display='flex';
  }
}

function renderPlayers(players) {
  document.getElementById('player-list').innerHTML=players.map((p,i)=>
    `<button class="player-btn ${i===0?'active':''} ${p.isFr?'french':''}" tabindex="0" onclick="selectPlayer(this,'${escHtml(p.url)}')">${escHtml(p.label)}</button>`
  ).join('');
}

function selectPlayer(btn,url) {
  document.querySelectorAll('.player-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadPlayerUrl(url);
}

let streamTimeout=null;
function loadPlayerUrl(url) {
  const frame=document.getElementById('stream-frame');
  const overlay=document.getElementById('loading-overlay');
  if (!frame||!overlay) return;
  if (streamTimeout) clearTimeout(streamTimeout);
  overlay.style.display='flex';
  overlay.innerHTML='<div class="spinner"></div><span>Chargement du stream...</span>';
  frame.src='';
  setTimeout(()=>{ frame.src=url; },50);
  frame.onload=()=>{ overlay.style.display='none'; };
  streamTimeout=setTimeout(()=>{
    overlay.innerHTML=`<div style="text-align:center;padding:30px;color:#4a5270"><div style="font-size:48px;margin-bottom:16px">⚠️</div><p style="font-size:18px">Ce player ne répond pas.<br>Essaie le suivant.</p></div>`;
  },15000);
}

function toggleCinema() {
  const wrap=document.getElementById('iframe-wrap');
  const btn=document.getElementById('fs-btn');
  const frame=document.getElementById('stream-frame');
  try { if(frame.requestFullscreen){frame.requestFullscreen();return;} if(frame.webkitRequestFullscreen){frame.webkitRequestFullscreen();return;} } catch(e){}
  const on=wrap.classList.toggle('cinema');
  btn.textContent=on?'✕ Quitter':'⛶ Plein écran';
}

function openInBrowser() { window.open(currentMatchUrl,'_blank'); }

function goBack() {
  document.getElementById('player-view').classList.remove('active');
  document.getElementById('app').style.display='flex';
  const frame=document.getElementById('stream-frame');
  if(frame) frame.src='';
  document.getElementById('iframe-wrap').classList.remove('cinema');
  if(streamTimeout) clearTimeout(streamTimeout);
  setTimeout(()=>{ const f=document.querySelector('.match-card'); if(f)f.focus(); },100);
}

// ── TV Remote ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const k=e.keyCode;
  if (k===8||k===27) {
    if (document.getElementById('player-view').classList.contains('active')) { e.preventDefault(); goBack(); }
    return;
  }
  const focused=document.activeElement;
  const cards=[...document.querySelectorAll('.match-card')];
  const tabs=[...document.querySelectorAll('.sport-tab')];
  const players=[...document.querySelectorAll('.player-btn')];
  const isCard=cards.includes(focused), isTab=tabs.includes(focused), isPlayer=players.includes(focused);

  if (k===40) { // Bas
    e.preventDefault();
    if (isTab) { if(cards.length)cards[0].focus(); }
    else if (isCard) { const i=cards.indexOf(focused); if(i<cards.length-1)cards[i+1].focus(); }
  }
  if (k===38) { // Haut
    e.preventDefault();
    if (isCard) { const i=cards.indexOf(focused); if(i>0)cards[i-1].focus(); else { const at=tabs.findIndex(t=>t.classList.contains('active')); tabs[Math.max(0,at)].focus(); } }
    else if (isTab) { document.getElementById('refresh-btn').focus(); }
  }
  if (k===39) { // Droite
    e.preventDefault();
    if (isTab) { const i=tabs.indexOf(focused); if(i<tabs.length-1)tabs[i+1].focus(); }
    else if (isPlayer) { const i=players.indexOf(focused); if(i<players.length-1)players[i+1].focus(); }
  }
  if (k===37) { // Gauche
    e.preventDefault();
    if (isTab) { const i=tabs.indexOf(focused); if(i>0)tabs[i-1].focus(); }
    else if (isPlayer) { const i=players.indexOf(focused); if(i>0)players[i-1].focus(); }
    else if (isCard) { const at=tabs.findIndex(t=>t.classList.contains('active')); tabs[Math.max(0,at)].focus(); }
  }
  if (k===13||k===32) {
    if (isCard||isTab||isPlayer) { e.preventDefault(); focused.click(); }
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
function buildTabs() {
  document.getElementById('sport-tabs').innerHTML=SPORT_CATEGORIES.map(cat=>
    `<div class="sport-tab ${cat.id==='all'?'active':''}" data-cat="${cat.id}" tabindex="0" onclick="selectCategory('${cat.id}')">
      <div class="tab-icon">${cat.icon}</div>
      <div class="tab-label">${cat.label}</div>
    </div>`
  ).join('');
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
buildTabs();
loadMatches();
</script>
